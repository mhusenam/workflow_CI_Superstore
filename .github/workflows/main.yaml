name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
      # ── 1. CHECKOUT ──────────────────────────────────────────
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # ── 2. PYTHON SETUP ──────────────────────────────────────
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      # ── 3. CHECK ENV ─────────────────────────────────────────
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working dir: $(pwd)"
          ls -la

      # ── 4. INSTALL DEPENDENCIES ──────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow pandas scikit-learn dagshub 
      # ── 5 & 6. RUN TRAINING & TANGKAP RUN_ID ─────────────────
      - name: Run training and get RUN_ID
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/mhusenam/Ekperimen_MuhammadHuseinAbdullahMahfud.mlflow"
          MLFLOW_TRACKING_USERNAME: "mhusenam"
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python modelling.py
          # Ambil RUN_ID murni dari file teks buatan Python tadi
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "✅ RUN_ID SUPER VALID: $RUN_ID"

      # ── 7. UPLOAD ARTIFACT TO GITHUB ─────────────────────────
      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: saved_model
          path: run_id.txt # Kita simpan file txt-nya saja sebagai bukti

      # ── 8. LOG IN TO DOCKER HUB ──────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 9. BUILD DOCKER MODEL ────────────────────────────────
      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/mhusenam/Ekperimen_MuhammadHuseinAbdullahMahfud.mlflow"
          MLFLOW_TRACKING_USERNAME: "mhusenam"
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          DAGSHUB_CLIENT_TOKEN: ${{ secrets.MLFLOW_TRACKING_PASSWORD }} # Memastikan Docker punya akses download ke DagsHub
        run: |
          mlflow models build-docker \
            -m "runs:/${{ env.RUN_ID }}/model" \
            -n ${{ secrets.DOCKERHUB_USERNAME }}/superstore-model:latest \
            --enable-mlserver
      
      # ── 10. LOG IN TO DOCKER HUB ─────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 11. TAG DOCKER IMAGE ─────────────────────────────────
      - name: Tag Docker Image
        run: |
          docker tag mhusenam/superstore-model:latest \
            mhusenam/superstore-model:${{ github.sha }}

      # ── 12. PUSH DOCKER IMAGE ────────────────────────────────
      - name: Push Docker Image
        run: |
          docker push mhusenam/superstore-model:latest
          docker push mhusenam/superstore-model:${{ github.sha }}
