name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
      # ── 1. CHECKOUT ──────────────────────────────────────────
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # ── 2. PYTHON SETUP ──────────────────────────────────────
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      # ── 3. CHECK ENV ─────────────────────────────────────────
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working dir: $(pwd)"
          ls -la

      # ── 4. INSTALL DEPENDENCIES ──────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow pandas scikit-learn dagshub 
      # ── 5. RUN MLFLOW PROJECT  ───────────────────
      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns"
        run: |
          rm -rf mlruns mlflow.db
          mlflow run ./MLProject --env-manager=local

      # ── 6. GET LATEST LOCAL MLFLOW RUN_ID ────────────────────
      - name: Get latest local MLflow run_id
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns"
        run: |
          RUN_ID=$(python -c "import mlflow; exps = mlflow.search_experiments(); df = mlflow.search_runs(experiment_ids=[e.experiment_id for e in exps]); print(df.iloc[0]['run_id'])")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "✅ Local Run ID: $RUN_ID"

      # ── 7. UPLOAD ARTIFACT TO GITHUB ─────────────────────────
      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
            name: superstore-model-artifact
            path: mlruns/
            retention-days: 5

      # ── 8. LOG IN TO DOCKER HUB ──────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 9. BUILD DOCKER MODEL LOKAL ──────────────────────────
      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            -m "runs:/${{ env.RUN_ID }}/model" \
            -n ${{ secrets.DOCKERHUB_USERNAME }}/superstore-model:latest \
            --enable-mlserver
      
      # ── 10. LOG IN TO DOCKER HUB ─────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 11. TAG DOCKER IMAGE ─────────────────────────────────
      - name: Tag Docker Image
        run: |
          docker tag mhusenam/superstore-model:latest \
            mhusenam/superstore-model:${{ github.sha }}

      # ── 12. PUSH DOCKER IMAGE ────────────────────────────────
      - name: Push Docker Image
        run: |
          docker push mhusenam/superstore-model:latest
          docker push mhusenam/superstore-model:${{ github.sha }}
